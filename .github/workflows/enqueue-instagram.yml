name: Enqueue Instagram Posts

on:
  push:
    branches:
      - main
      - master
    paths:
      - "assets/**"
  workflow_dispatch:
    inputs:
      enqueue_all_assets:
        description: "When true, enqueue all supported files under assets/."
        required: false
        default: "false"

jobs:
  enqueue:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Enqueue changed assets
        env:
          CF_INGEST_URL: ${{ secrets.CF_INGEST_URL }}
          CF_INGEST_TOKEN: ${{ secrets.CF_INGEST_TOKEN }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          ENQUEUE_ALL_ASSETS: ${{ inputs.enqueue_all_assets }}
        run: python scripts/enqueue_posts.py
