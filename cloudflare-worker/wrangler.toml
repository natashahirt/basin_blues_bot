name = "instagram-autoposter"
main = "src/index.js"
compatibility_date = "2026-04-14"

[vars]
PUBLIC_BASE_URL = "https://basinbluesassets.nkhirt.com"
MIN_GAP_MINUTES = "60"
MAX_JITTER_MINUTES = "20"
QUIET_HOURS_START = "23"
QUIET_HOURS_END = "7"
POST_TIMEZONE = "America/New_York"
IG_USER_ID = "17841468808374031"

[[kv_namespaces]]
binding = "STATE"
id = "985472dee32e44be80c1af597d4f5ad6"

[[queues.producers]]
queue = "instagram-posts-v2"
binding = "POST_QUEUE"

[[queues.consumers]]
queue = "instagram-posts-v2"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "instagram-posts-dlq-v2"
max_concurrency = 1
